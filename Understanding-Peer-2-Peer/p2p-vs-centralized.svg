
<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">

<style>
.title {
  font-family: Arial, sans-serif;
  font-size: 28px;
  font-weight: bold;
  fill: #1f2937;
}

.label {
  font-family: Arial, sans-serif;
  font-size: 20px;
  fill: #374151;
}

.node {
  stroke-width: 3;
}

.line {
  stroke-width: 4;
}
</style>


<!-- LEFT SIDE -->
<text x="150" y="50" class="title">
Centralized Network
</text>

<!-- Server -->
<rect x="120" y="130" width="120" height="70" rx="12"
fill="#2563eb" class="node" stroke="#1e40af"/>

<text x="145" y="175" font-size="22" fill="white">
SERVER
</text>


<!-- Clients -->
<circle cx="80" cy="320" r="35" fill="#10b981"/>
<circle cx="180" cy="320" r="35" fill="#10b981"/>
<circle cx="280" cy="320" r="35" fill="#10b981"/>


<text x="65" y="327" fill="white">A</text>
<text x="165" y="327" fill="white">B</text>
<text x="265" y="327" fill="white">C</text>


<!-- Connections -->
<line x1="180" y1="200" x2="80" y2="285" stroke="#6b7280" class="line"/>
<line x1="180" y1="200" x2="180" y2="285" stroke="#6b7280" class="line"/>
<line x1="180" y1="200" x2="280" y2="285" stroke="#6b7280" class="line"/>


<!-- RIGHT SIDE -->
<text x="590" y="50" class="title">
Peer-to-Peer Network
</text>


<!-- Peers -->
<circle cx="600" cy="160" r="40" fill="#8b5cf6"/>
<circle cx="760" cy="160" r="40" fill="#8b5cf6"/>
<circle cx="600" cy="320" r="40" fill="#8b5cf6"/>
<circle cx="760" cy="320" r="40" fill="#8b5cf6"/>


<text x="588" y="168" fill="white">A</text>
<text x="748" y="168" fill="white">B</text>
<text x="588" y="328" fill="white">C</text>
<text x="748" y="328" fill="white">D</text>


<!-- Connections -->
<line x1="640" y1="160" x2="720" y2="160" stroke="#8b5cf6" class="line"/>
<line x1="600" y1="200" x2="600" y2="280" stroke="#8b5cf6" class="line"/>
<line x1="760" y1="200" x2="760" y2="280" stroke="#8b5cf6" class="line"/>
<line x1="640" y1="320" x2="720" y2="320" stroke="#8b5cf6" class="line"/>

<line x1="630" y1="190" x2="730" y2="290" stroke="#8b5cf6" class="line"/>
<line x1="730" y1="190" x2="630" y2="290" stroke="#8b5cf6" class="line"/>


<!-- Bottom explanation -->
<text x="80" y="410" class="label">
One computer controls everything
</text>

<text x="570" y="410" class="label">
Everyone connects and shares
</text>


</svg>
